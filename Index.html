  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Gastos - Rafael</title>
  <script src="https://cdn.jsdelivr.net/npm/highcharts@12.1.2/highcharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highcharts@12.1.2/modules/accessibility.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --blue: #4a90d9;
      --teal: #5bc0be;
      --pink: #e84393;
      --purple: #a855f7;
      --green: #00d2d3;
      --orange: #f59e0b;
      --red: #ef4444;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: var(--font-sans); color: var(--text); padding: 20px; min-height: 100vh; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header h1 i { color: var(--blue); }
    .btn-refresh { background: var(--blue); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 500; }
    .btn-refresh:hover { background: #3a7bd5; }

    .status-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; margin-bottom: 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.ok { background: #10b981; }
    .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .filter-box label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
    .filter-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill { padding: 4px 10px; border-radius: 4px; font-size: 0.72rem; font-weight: 500; cursor: pointer; background: #f1f5f9; color: var(--text); border: 1px solid var(--border); transition: all 0.15s; }
    .pill.active { background: var(--blue); color: white; border-color: var(--blue); }
    .pill:hover:not(.active) { background: #e2e8f0; }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; }
    .kpi-card .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .kpi-card .kpi-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; }
    .kpi-card .kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--text); }
    .kpi-card .kpi-sub { font-size: 0.68rem; color: var(--text-muted); margin-top: 6px; }
    .kpi-card .kpi-compare { font-size: 0.7rem; margin-top: 6px; font-weight: 600; }
    .kpi-card .kpi-compare.up { color: var(--red); }
    .kpi-card .kpi-compare.down { color: #10b981; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .card h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 14px; color: var(--text); }
    .card h3 i { margin-right: 6px; }

    .top-list { list-style: none; }
    .top-list li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.78rem; }
    .top-list li:last-child { border-bottom: none; }
    .top-list .lugar-name { color: var(--text); font-weight: 500; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .top-list .lugar-monto { color: var(--text); font-weight: 700; }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .filters { flex-direction: column; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .kpi-card .kpi-value { font-size: 1.2rem; }
    }
    @media (max-width: 480px) { .kpi-row { grid-template-columns: 1fr; } }
  </style>
</head>

  <div id="content" style="display:none;">
    <div class="kpi-row" id="kpi-container"></div>

    <div class="grid-3">
      <div class="card">
        <h3><i class="fas fa-chart-bar" style="color:var(--blue)"></i>Gasto por Concepto (Top 10)</h3>
        <div id="chart-conceptos" style="height: 320px;"></div>

      <div class="card">
        <h3><i class="fas fa-chart-line" style="color:var(--teal)"></i>Tendencia Mensual</h3>
        <div id="chart-tendencia" style="height: 280px;"></div>
      </div>

        <h3><i class="fas fa-chart-pie" style="color:var(--orange)"></i>Distribucion del Gasto</h3>

      <div class="card">

      </div>
      <div class="card">
        <h3><i class="fas fa-balance-scale" style="color:var(--green)"></i>Comparativa Mensual</h3>
        <div id="chart-comparativa" style="height: 280px;"></div>
      </div>
    </div>
  </div>

  <script>
    // =====================================================
    // TU ENLACE DE GOOGLE SHEETS
    // =====================================================
    var SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRR1i5P_D2n8yZ9qKTrLCU2qEBVk5pkxt7IGDfXh0lrwOCxtf9Ih3QZyWSg5pR0ee5ozm7kZnBRUc-j/pub?gid=0&single=true&output=csv';

    // COLUMNAS
    var COL_MONTO = 'Monto';
    var COL_TIPO = 'Tipo';
    var COL_LUGAR = 'Lugar_Comercio';
    var COL_CONCEPTO = 'Concepto';
    var COL_ANO = 'Ano';
    var COL_MES = 'Mes';
    var COL_SEMANA = 'Semana';
    var COL_CUENTA = 'Cuenta';

    var MESES_ORDEN = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    var BANNER_COLORS = ['#4a90d9','#5bc0be','#e84393','#a855f7','#00d2d3','#f59e0b','#ef4444','#10b981','#6366f1','#ec4899'];

    // Datos de respaldo con multiples anos y cuentas
    var FALLBACK_DATA = [
      {monto:100,tipo:'Gasto',lugar:'BMOV (Recarga)',concepto:'Recarga Telefonica',ano:'2024',mes:'diciembre',semana:'WK 01',cuenta:'Libreton Premium'},
      {monto:500,tipo:'Gasto',lugar:'BBVA (Cuenta Tercero)',concepto:'Transferencia',ano:'2024',mes:'diciembre',semana:'WK 01',cuenta:'Libreton Premium'},
      {monto:628.62,tipo:'Gasto',lugar:'MERCADO PAGO',concepto:'Pago de Credito',ano:'2024',mes:'diciembre',semana:'WK 01',cuenta:'Tarjeta Azul BBVA'},
      {monto:149,tipo:'Gasto',lugar:'Amazon Mx',concepto:'Compras en linea',ano:'2024',mes:'diciembre',semana:'WK 01',cuenta:'Nu'},
      {monto:11000,tipo:'Gasto',lugar:'Nu Mexico (RafaelSTP)',concepto:'Pago de Credito',ano:'2024',mes:'diciembre',semana:'WK 50',cuenta:'Libreton Premium'},
      {monto:1056.8,tipo:'Gasto',lugar:'BBVA (Pago TDC)',concepto:'Pago de Credito',ano:'2024',mes:'diciembre',semana:'WK 50',cuenta:'Libreton Premium'},
      {monto:368,tipo:'Gasto',lugar:'NETFLIX',concepto:'Streaming',ano:'2024',mes:'diciembre',semana:'WK 50',cuenta:'Tarjeta Azul BBVA'},
      {monto:2543.34,tipo:'Ingreso',lugar:'HSBC (Amazon Mexico)',concepto:'Nomina',ano:'2024',mes:'diciembre',semana:'WK 50',cuenta:'Libreton Premium'},
      {monto:3130.43,tipo:'Gasto',lugar:'BBVA (Pago TDC)',concepto:'Pago de Credito',ano:'2024',mes:'diciembre',semana:'WK 51',cuenta:'Libreton Premium'},
      {monto:95,tipo:'Gasto',lugar:'APPLE.COM/BILL',concepto:'Nube',ano:'2024',mes:'diciembre',semana:'WK 51',cuenta:'Tarjeta Azul BBVA'},
      {monto:349,tipo:'Gasto',lugar:'Sanborns',concepto:'Compras',ano:'2024',mes:'diciembre',semana:'WK 51',cuenta:'Nu'},
      {monto:2594.85,tipo:'Ingreso',lugar:'HSBC (Amazon Mexico)',concepto:'Nomina',ano:'2025',mes:'enero',semana:'WK 02',cuenta:'Libreton Premium'},
      {monto:1500,tipo:'Gasto',lugar:'Nu Mexico (RafaelSTP)',concepto:'Pago de Credito',ano:'2025',mes:'enero',semana:'WK 02',cuenta:'Libreton Premium'},
      {monto:250,tipo:'Gasto',lugar:'Amazon Mx',concepto:'Compras en linea',ano:'2025',mes:'enero',semana:'WK 02',cuenta:'Nu'},
      {monto:1200,tipo:'Gasto',lugar:'BBVA (Pago TDC)',concepto:'Pago de Credito',ano:'2025',mes:'enero',semana:'WK 03',cuenta:'Tarjeta Azul BBVA'},
      {monto:450,tipo:'Gasto',lugar:'Uber Eats',concepto:'Comida En Linea',ano:'2025',mes:'enero',semana:'WK 03',cuenta:'Nu'},
      {monto:5500,tipo:'Gasto',lugar:'Casero',concepto:'Renta',ano:'2025',mes:'febrero',semana:'WK 05',cuenta:'Libreton Premium'},
      {monto:890,tipo:'Gasto',lugar:'Soriana',concepto:'Despensa',ano:'2025',mes:'febrero',semana:'WK 06',cuenta:'Libreton Premium'},
      {monto:2600,tipo:'Ingreso',lugar:'HSBC (Amazon Mexico)',concepto:'Nomina',ano:'2025',mes:'febrero',semana:'WK 06',cuenta:'Libreton Premium'},
      {monto:320,tipo:'Gasto',lugar:'Amazon Mx',concepto:'Compras en linea',ano:'2026',mes:'junio',semana:'WK 25',cuenta:'Nu'},
      {monto:2600,tipo:'Ingreso',lugar:'HSBC (Amazon Mexico)',concepto:'Nomina',ano:'2026',mes:'junio',semana:'WK 26',cuenta:'Libreton Premium'},
      {monto:1100,tipo:'Gasto',lugar:'BBVA (Pago TDC)',concepto:'Pago de Credito',ano:'2026',mes:'junio',semana:'WK 26',cuenta:'Tarjeta Azul BBVA'},
    ];

    var allRows = [];
    var activeFilters = { ano: null, mes: null, tipo: 'Gasto', cuenta: null };

    function parseCSV(text) {
      var lines = text.trim().split('\n');
      var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,'').replace(/^\uFEFF/,''); });
      var result = [];
      for (var i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        var values = []; var current = ''; var inQ = false;
        for (var j = 0; j < lines[i].length; j++) {
          var ch = lines[i][j];
          if (ch === '"') inQ = !inQ;
          else if (ch === ',' && !inQ) { values.push(current.trim()); current = ''; }
          else current += ch;
        }
        values.push(current.trim());
        var obj = {};
        for (var k = 0; k < headers.length; k++) obj[headers[k]] = values[k] || '';
        result.push(obj);
      }
      return result;
    }

    function getVal(row, col) {
      var keys = Object.keys(row);
      var norm = function(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,''); };
      var target = norm(col);
      for (var i = 0; i < keys.length; i++) { if (norm(keys[i]) === target) return (row[keys[i]]||'').trim(); }
      return '';
    }

    function getNum(row) {
      var val = getVal(row, COL_MONTO);
      val = val.replace('%','').replace('$','').replace(/,/g,'');
      return parseFloat(val) || 0;
    }

    function formatMoney(n) {
      return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function getMesIndex(mes) {
      var m = (mes||'').toLowerCase();
      var idx = MESES_ORDEN.indexOf(m);
      return idx >= 0 ? idx : 99;
    }

    function buildFilters() {
      var anos = {}, meses = {}, tipos = {}, cuentas = {};
      for (var i = 0; i < allRows.length; i++) {
        if (allRows[i].ano) anos[allRows[i].ano] = true;
        if (allRows[i].mes) meses[allRows[i].mes] = true;
        if (allRows[i].tipo) tipos[allRows[i].tipo] = true;
        if (allRows[i].cuenta) cuentas[allRows[i].cuenta] = true;
      }
      var anoList = Object.keys(anos).sort();
      var mesList = Object.keys(meses).sort(function(a,b){ return getMesIndex(a) - getMesIndex(b); });
      var cuentaList = Object.keys(cuentas).sort();

      renderPills('filter-ano', ['Todos'].concat(anoList), 'ano', false);
      renderPills('filter-mes', ['Todos'].concat(mesList), 'mes', false);
      renderPills('filter-tipo', ['Gasto','Ingreso','Todos'], 'tipo', false);
      renderPills('filter-cuenta', ['Todas'].concat(cuentaList), 'cuenta', false);
    }

    function renderPills(id, items, key, selectLast) {
      var container = document.getElementById(id);
      if (!container) return;
      container.innerHTML = '';
      for (var i = 0; i < items.length; i++) {
        var isActive = false;
        if (key === 'tipo') isActive = (items[i] === 'Gasto');
        else isActive = (i === 0);

        var pill = document.createElement('span');
        pill.className = 'pill' + (isActive ? ' active' : '');
        pill.textContent = items[i];
        pill.setAttribute('data-key', key);
        pill.setAttribute('data-value', items[i]);
        pill.onclick = function() {
          var siblings = this.parentNode.querySelectorAll('.pill');
          for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove('active');
          this.classList.add('active');
          var v = this.getAttribute('data-value');
          activeFilters[this.getAttribute('data-key')] = (v === 'Todos' || v === 'Todas') ? null : v;
          applyFilters();
        };
        container.appendChild(pill);
        if (isActive) {
          var val = items[i];
          activeFilters[key] = (val === 'Todos' || val === 'Todas') ? null : val;
        }
      }
    }

    function getFiltered() {
      var filtered = [];
      for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        if (activeFilters.ano && r.ano !== activeFilters.ano) continue;
        if (activeFilters.mes && r.mes.toLowerCase() !== activeFilters.mes.toLowerCase()) continue;
        if (activeFilters.tipo && r.tipo.toLowerCase().indexOf(activeFilters.tipo.toLowerCase()) === -1) continue;
        if (activeFilters.cuenta && r.cuenta !== activeFilters.cuenta) continue;
        filtered.push(r);
      }
      return filtered;
    }

    function applyFilters() {
      var filtered = getFiltered();
      renderKPIs(filtered);
      renderConceptos(filtered);
      renderTopLugares(filtered);
      renderDonut(filtered);
      renderTendencia();
      renderCuentas(filtered);
      renderComparativa();
    }

    function renderKPIs(filtered) {
      var container = document.getElementById('kpi-container');
      if (!container) return;
      container.innerHTML = '';

      var totalGasto = 0; var count = 0;
      var conceptos = {};
      for (var i = 0; i < filtered.length; i++) {
        totalGasto += filtered[i].monto;
        count++;
        var c = filtered[i].concepto;
        if (!conceptos[c]) conceptos[c] = 0;
        conceptos[c] += filtered[i].monto;
      }

      // Comparativa mes anterior
      var compareHTML = '';
      if (activeFilters.mes && activeFilters.ano) {
        var mesIdx = getMesIndex(activeFilters.mes);
        var prevMes = mesIdx > 0 ? MESES_ORDEN[mesIdx - 1] : MESES_ORDEN[11];
        var prevAno = mesIdx > 0 ? activeFilters.ano : (parseInt(activeFilters.ano) - 1).toString();
        var prevTotal = 0;
        for (var i = 0; i < allRows.length; i++) {
          var r = allRows[i];
          if (r.ano === prevAno && r.mes.toLowerCase() === prevMes) {
            if (activeFilters.tipo && r.tipo.toLowerCase().indexOf(activeFilters.tipo.toLowerCase()) === -1) continue;
            if (activeFilters.cuenta && r.cuenta !== activeFilters.cuenta) continue;
            prevTotal += r.monto;
          }
        }
        if (prevTotal > 0) {
          var diff = totalGasto - prevTotal;
          var pct = ((diff / prevTotal) * 100).toFixed(0);
          var cls = diff > 0 ? 'up' : 'down';
          var arrow = diff > 0 ? '<i class="fas fa-arrow-up"></i>' : '<i class="fas fa-arrow-down"></i>';
          compareHTML = '<div class="kpi-compare ' + cls + '">' + arrow + ' ' + Math.abs(pct) + '% vs ' + prevMes + '</div>';
        }
      }

      // KPI Total
      var card1 = document.createElement('div');
      card1.className = 'kpi-card';
      card1.innerHTML = '<div class="kpi-accent" style="background:var(--blue)"></div><div class="kpi-label"><i class="fas fa-money-bill-wave" style="margin-right:4px"></i>Total ' + (activeFilters.tipo || 'Movimientos') + '</div><div class="kpi-value">' + formatMoney(totalGasto) + '</div><div class="kpi-sub">' + count + ' movimientos</div>' + compareHTML;
      container.appendChild(card1);

      // Top conceptos
      var sorted = Object.keys(conceptos).sort(function(a,b){ return conceptos[b] - conceptos[a]; });
      for (var i = 0; i < Math.min(4, sorted.length); i++) {
        var card = document.createElement('div');
        card.className = 'kpi-card';
        var color = BANNER_COLORS[(i+1) % BANNER_COLORS.length];
        card.innerHTML = '<div class="kpi-accent" style="background:' + color + '"></div><div class="kpi-label">' + sorted[i] + '</div><div class="kpi-value">' + formatMoney(conceptos[sorted[i]]) + '</div><div class="kpi-sub">' + ((conceptos[sorted[i]]/totalGasto)*100).toFixed(1) + '% del total</div>';
        container.appendChild(card);
      }
    }

    function renderConceptos(filtered) {
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i].concepto;
        if (!groups[c]) groups[c] = 0;
        groups[c] += filtered[i].monto;
      }
      var sorted = Object.keys(groups).sort(function(a,b){ return groups[b] - groups[a]; });
      var cats = sorted.slice(0, 10);
      var vals = cats.map(function(c){ return parseFloat(groups[c].toFixed(2)); });
      var colors = cats.map(function(c,i){ return BANNER_COLORS[i % BANNER_COLORS.length]; });

      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-conceptos', {
          chart: { type: 'bar', backgroundColor: 'transparent' },
          title: { text: null },
          xAxis: { categories: cats, labels: { style: { color: '#64748b', fontSize: '0.72rem' } } },
          yAxis: { title: { text: null }, labels: { style: { color: '#64748b' }, formatter: function(){ return '$' + (this.value/1000).toFixed(0) + 'k'; } }, gridLineColor: '#f1f5f9' },
          tooltip: { formatter: function(){ return '<b>' + this.point.category + '</b><br>$' + this.y.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); } },
          plotOptions: { bar: { borderRadius: 4, dataLabels: { enabled: true, formatter: function(){ return '$' + (this.y >= 1000 ? (this.y/1000).toFixed(1) + 'k' : this.y.toFixed(0)); }, style: { fontSize: '0.7rem', textOutline: 'none', color: '#64748b' } } } },
          series: [{ name: 'Monto', data: vals, colorByPoint: true, colors: colors, showInLegend: false }],
          credits: { enabled: false }
        });
      }
    }

    function renderTopLugares(filtered) {
      var container = document.getElementById('top-lugares');
      if (!container) return;
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var l = filtered[i].lugar;
        if (!groups[l]) groups[l] = 0;
        groups[l] += filtered[i].monto;
      }
      var sorted = Object.keys(groups).sort(function(a,b){ return groups[b] - groups[a]; });
      var html = '';
      for (var i = 0; i < Math.min(12, sorted.length); i++) {
        html += '<li><span class="lugar-name">' + sorted[i] + '</span><span class="lugar-monto">' + formatMoney(groups[sorted[i]]) + '</span></li>';
      }
      container.innerHTML = html;
    }

    function renderDonut(filtered) {
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i].concepto;
        if (!groups[c]) groups[c] = 0;
        groups[c] += filtered[i].monto;
      }
      var sorted = Object.keys(groups).sort(function(a,b){ return groups[b] - groups[a]; });
      var data = [];
      for (var i = 0; i < Math.min(8, sorted.length); i++) {
        data.push({ name: sorted[i], y: parseFloat(groups[sorted[i]].toFixed(2)), color: BANNER_COLORS[i % BANNER_COLORS.length] });
      }
      if (sorted.length > 8) {
        var otros = 0;
        for (var i = 8; i < sorted.length; i++) otros += groups[sorted[i]];
        data.push({ name: 'Otros', y: parseFloat(otros.toFixed(2)), color: '#94a3b8' });
      }
      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-donut', {
          chart: { type: 'pie', backgroundColor: 'transparent' },
          title: { text: null },
          tooltip: { pointFormat: '<b>${point.y:,.2f}</b> ({point.percentage:.1f}%)' },
          plotOptions: { pie: { innerSize: '55%', borderWidth: 2, borderColor: '#fff', dataLabels: { enabled: true, format: '{point.name}<br>{point.percentage:.0f}%', style: { fontSize: '0.68rem', textOutline: 'none' } } } },
          series: [{ data: data }],
          credits: { enabled: false }
        });
      }
    }

    function renderCuentas(filtered) {
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i].cuenta;
        if (!c) continue;
        if (!groups[c]) groups[c] = 0;
        groups[c] += filtered[i].monto;
      }
      var sorted = Object.keys(groups).sort(function(a,b){ return groups[b] - groups[a]; });
      var cats = sorted;
      var vals = cats.map(function(c){ return parseFloat(groups[c].toFixed(2)); });
      var colors = ['#e84393','#4a90d9','#f59e0b','#5bc0be','#a855f7','#00d2d3','#ef4444','#10b981'];

      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-cuentas', {
          chart: { type: 'column', backgroundColor: 'transparent' },
          title: { text: null },
          xAxis: { categories: cats, labels: { style: { color: '#64748b', fontSize: '0.72rem' } } },
          yAxis: { title: { text: null }, labels: { style: { color: '#64748b' }, formatter: function(){ return '$' + (this.value/1000).toFixed(0) + 'k'; } }, gridLineColor: '#f1f5f9' },
          tooltip: { formatter: function(){ return '<b>' + this.point.category + '</b><br>$' + this.y.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); } },
          plotOptions: { column: { borderRadius: 6, dataLabels: { enabled: true, formatter: function(){ return '$' + (this.y >= 1000 ? (this.y/1000).toFixed(1) + 'k' : this.y.toFixed(0)); }, style: { fontSize: '0.7rem', textOutline: 'none', color: '#64748b' } } } },
          series: [{ name: 'Monto', data: vals, colorByPoint: true, colors: colors, showInLegend: false }],
          credits: { enabled: false }
        });
      }
    }

    function renderComparativa() {
      // Ultimos 6 meses
      var tipoFilter = activeFilters.tipo;
      var cuentaFilter = activeFilters.cuenta;
      var monthsMap = {};
      for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        if (tipoFilter && r.tipo.toLowerCase().indexOf(tipoFilter.toLowerCase()) === -1) continue;
        if (cuentaFilter && r.cuenta !== cuentaFilter) continue;
        var mesIdx = getMesIndex(r.mes);
        var key = r.ano + '-' + String(mesIdx + 1).padStart(2, '0');
        if (!monthsMap[key]) monthsMap[key] = { total: 0, label: r.mes.substring(0,3) + ' ' + r.ano.substring(2) };
        monthsMap[key].total += r.monto;
      }
      var allKeys = Object.keys(monthsMap).sort();
      var last6 = allKeys.slice(-6);
      var cats = last6.map(function(k){ return monthsMap[k].label; });
      var vals = last6.map(function(k){ return parseFloat(monthsMap[k].total.toFixed(2)); });

      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-comparativa', {
          chart: { type: 'column', backgroundColor: 'transparent' },
          title: { text: null },
          xAxis: { categories: cats, labels: { style: { color: '#64748b', fontSize: '0.75rem' } } },
          yAxis: { title: { text: null }, labels: { style: { color: '#64748b' }, formatter: function(){ return '$' + (this.value/1000).toFixed(0) + 'k'; } }, gridLineColor: '#f1f5f9' },
          tooltip: { formatter: function(){ return '<b>' + this.x + '</b><br>$' + this.y.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); } },
          plotOptions: { column: { borderRadius: 6, color: '#4a90d9' } },
          series: [{ name: 'Total', data: vals, showInLegend: false }],
          credits: { enabled: false }
        });
      }
    }

    function renderTendencia() {
      var tipoFilter = activeFilters.tipo;
      var cuentaFilter = activeFilters.cuenta;
      var map = {};
      for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        if (tipoFilter && r.tipo.toLowerCase().indexOf(tipoFilter.toLowerCase()) === -1) continue;
        if (cuentaFilter && r.cuenta !== cuentaFilter) continue;
        var mesIdx = getMesIndex(r.mes);
        var key = r.ano + '-' + String(mesIdx + 1).padStart(2, '0');
        if (!map[key]) map[key] = { total: 0, label: r.mes.substring(0,3) + ' ' + r.ano };
        map[key].total += r.monto;
      }
      var keys = Object.keys(map).sort();
      var cats = keys.map(function(k){ return map[k].label; });
      var vals = keys.map(function(k){ return parseFloat(map[k].total.toFixed(2)); });
      var lineColor = (activeFilters.tipo === 'Gasto') ? '#ef4444' : (activeFilters.tipo === 'Ingreso' ? '#10b981' : '#4a90d9');

      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-tendencia', {
          chart: { type: 'areaspline', backgroundColor: 'transparent' },
          title: { text: null },
          xAxis: { categories: cats, labels: { style: { color: '#64748b', fontSize: '0.7rem' }, rotation: -45 } },
          yAxis: { title: { text: null }, labels: { style: { color: '#64748b' }, formatter: function(){ return '$' + (this.value/1000).toFixed(0) + 'k'; } }, gridLineColor: '#f1f5f9' },
          tooltip: { formatter: function(){ return '<b>' + this.x + '</b><br>$' + this.y.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); } },
          plotOptions: { areaspline: { fillOpacity: 0.1, marker: { radius: 3 }, lineWidth: 2.5 } },
          series: [{ name: activeFilters.tipo || 'Total', data: vals, color: lineColor }],
          legend: { enabled: false },
          credits: { enabled: false }
        });
      }
    }

    function loadFromSheet() {
      var dot = document.getElementById('status-dot');
      var status = document.getElementById('status-text');
      if (dot) dot.className = 'dot loading';
      if (status) status.textContent = 'Conectando con Google Sheets...';

      fetch(SHEET_URL)
        .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
        .then(function(text){
          if (text.indexOf('<!DOCTYPE')!==-1) throw new Error('No CSV');
          var rows = parseCSV(text);
          if (rows.length === 0) throw new Error('Sin datos');
          allRows = [];
          for (var i = 0; i < rows.length; i++) {
            allRows.push({
              monto: getNum(rows[i]),
              tipo: getVal(rows[i], COL_TIPO),
              lugar: getVal(rows[i], COL_LUGAR),
              concepto: getVal(rows[i], COL_CONCEPTO),
              ano: getVal(rows[i], COL_ANO),
              mes: getVal(rows[i], COL_MES),
              semana: getVal(rows[i], COL_SEMANA),
              cuenta: getVal(rows[i], COL_CUENTA)
            });
          }
          if (dot) dot.className = 'dot ok';
          if (status) status.textContent = 'Conectado - ' + allRows.length + ' registros - ' + new Date().toLocaleString('es-MX');
          document.getElementById('content').style.display = 'block';
          buildFilters();
          applyFilters();
        })
        .catch(function(err){
          console.log('Usando datos de respaldo:', err.message);
          allRows = FALLBACK_DATA;
          if (dot) dot.className = 'dot ok';
          if (status) status.textContent = 'Modo demo (' + allRows.length + ' registros) - En GitHub Pages se conecta a tu Sheet';
          document.getElementById('content').style.display = 'block';
          buildFilters();
          applyFilters();
        });
    }

    loadFromSheet();
  </script>

</body></html>
