  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard DVS2 - Métricas</title>
  <script src="https://cdn.jsdelivr.net/npm/highcharts@12.1.2/highcharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highcharts@12.1.2/modules/accessibility.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --blue: #4a90d9;
      --teal: #5bc0be;
      --pink: #e84393;
      --purple: #a855f7;
      --green: #00d2d3;
      --orange: #f59e0b;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --bg: #ffffff;
      --bg-light: #f8f9fa;
      --text: #2d3436;
      --text-muted: #636e72;
      --border: #dfe6e9;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-light); font-family: var(--font-sans); color: var(--text); padding: 20px; min-height: 100vh; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 1.4rem; font-weight: 700; }
    .filters { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-box { background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); padding: 10px 14px; min-width: 160px; }
    .filter-box label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 8px; }
    .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { padding: 5px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer; background: var(--bg-light); color: var(--text); border: 1px solid var(--border); transition: all 0.2s; }
    .pill.active { background: var(--blue); color: white; border-color: var(--blue); }
    .pill:hover:not(.active) { background: #e8f0fe; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-banner { border-radius: var(--radius); padding: 16px 20px; text-align: center; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .kpi-banner .kpi-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; margin-bottom: 6px; }
    .kpi-banner .kpi-val { font-size: 1.6rem; font-weight: 800; }
    .kpi-banner .kpi-sub { font-size: 0.65rem; opacity: 0.8; margin-top: 4px; }
    .charts-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }
    .chart-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .chart-box h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
    .status-bar { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; margin-bottom: 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.ok { background: #00b894; }
    .dot.err { background: #e74c3c; }
    .dot.loading { background: #f39c12; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .btn-refresh { background: var(--blue); color: white; border: none; padding: 6px 14px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; margin-left: auto; }
    .btn-refresh:hover { background: #3a7bd5; }
    @media (max-width: 768px) { body { padding: 12px; } .filters { flex-direction: column; } .kpi-row { grid-template-columns: repeat(2, 1fr); } .kpi-banner .kpi-val { font-size: 1.3rem; } .charts-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .kpi-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="header">
    <h1><i class="fas fa-gauge-high" style="margin-right:8px; color:var(--blue)"></i>Dashboard DVS2</h1>
    <button class="btn-refresh" onclick="loadFromSheet()"><i class="fas fa-sync-alt" style="margin-right:5px"></i>Actualizar</button>
  </div>

  <div class="status-bar">
    <span class="dot loading" id="status-dot"></span>
    <span id="status-text">Cargando...</span>
  </div>

  <div class="filters">
    <div class="filter-box"><label>Semana</label><div class="filter-pills" id="filter-semana"></div></div>
    <div class="filter-box"><label>Ano</label><div class="filter-pills" id="filter-ano"></div></div>
    <div class="filter-box"><label>Concepto</label><div class="filter-pills" id="filter-concepto"></div></div>
  </div>

  <div id="content">
    <div class="kpi-row" id="kpi-container"></div>
    <div class="charts-grid">
      <div class="chart-box">
        <h3><i class="fas fa-chart-line" style="margin-right:6px; color:var(--blue)"></i>Tendencia Semanal</h3>
        <div id="chart-line" style="height: 300px;"></div>
      </div>
      <div class="chart-box">
        <h3><i class="fas fa-chart-pie" style="margin-right:6px; color:var(--teal)"></i>Distribucion por Concepto</h3>
        <div id="chart-donut" style="height: 300px;"></div>
      </div>
    </div>
  </div>

    // =====================================================

    // MAPEO DE TUS COLUMNAS
    var COL_MONTO = 'Monto';
    var COL_CONCEPTO = 'Concepto';
    var COL_SEMANA = 'Semana';
    var COL_ANO = 'Ano';
    var COL_LUGAR = 'Lugar_Comercio';

    // Datos de respaldo cuando no se puede conectar al Sheet
    var FALLBACK_DATA = [
      { concepto: 'FDDS', monto: 98.50, semana: '27', ano: '2026', lugar: 'DVS2' },
      { concepto: 'DPPH', monto: 99.10, semana: '27', ano: '2026', lugar: 'DVS2' },
      { concepto: 'FDDS', monto: 97.80, semana: '26', ano: '2026', lugar: 'DVS2' },
      { concepto: 'DPPH', monto: 98.40, semana: '26', ano: '2026', lugar: 'DVS2' },
      { concepto: 'FDDS', monto: 96.50, semana: '25', ano: '2026', lugar: 'DVS2' },
      { concepto: 'DPPH', monto: 97.90, semana: '25', ano: '2026', lugar: 'DVS2' },
      { concepto: 'FDDS', monto: 95.20, semana: '24', ano: '2026', lugar: 'DVS2' },
      { concepto: 'DPPH', monto: 99.10, semana: '24', ano: '2026', lugar: 'DVS2' },
    ];

    var BANNER_COLORS = ['#4a90d9', '#5bc0be', '#e84393', '#a855f7', '#00d2d3', '#f59e0b', '#ef4444', '#10b981'];
    var allRows = [];
    var activeFilters = { semana: null, ano: null, concepto: null };

    function parseCSV(text) {
      var lines = text.trim().split('\n');
      var headers = lines[0].split(',').map(function(h) { return h.trim().replace(/"/g, '').replace(/^\uFEFF/, ''); });
      var result = [];
      for (var i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        var values = [];
        var current = '';
        var inQuotes = false;
        for (var j = 0; j < lines[i].length; j++) {
          var ch = lines[i][j];
          if (ch === '"') { inQuotes = !inQuotes; }
          else if (ch === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
          else { current += ch; }
        }
        values.push(current.trim());
        var obj = {};
        for (var k = 0; k < headers.length; k++) { obj[headers[k]] = values[k] || ''; }
        result.push(obj);
      }
      return result;
    }

    function getVal(row, col) {
      var keys = Object.keys(row);
      var norm = function(s) { return s.toLowerCase().replace(/[aeiou\u00e1\u00e9\u00ed\u00f3\u00fa\u00f1_\s]/g, ''); };
      for (var i = 0; i < keys.length; i++) {
        if (norm(keys[i]) === norm(col)) return (row[keys[i]] || '').trim();
      }
      return '';
    }

    function getNumeric(row) {
      var val = getVal(row, COL_MONTO);
      val = val.replace('%', '').replace('$', '').replace(/,/g, '');
      return parseFloat(val) || 0;
    }

    function buildFilters() {
      var semanas = [], anos = [], conceptos = [];
      var seenS = {}, seenA = {}, seenC = {};
      for (var i = 0; i < allRows.length; i++) {
        if (allRows[i].semana && !seenS[allRows[i].semana]) { semanas.push(allRows[i].semana); seenS[allRows[i].semana] = true; }
        if (allRows[i].ano && !seenA[allRows[i].ano]) { anos.push(allRows[i].ano); seenA[allRows[i].ano] = true; }
        if (allRows[i].concepto && !seenC[allRows[i].concepto]) { conceptos.push(allRows[i].concepto); seenC[allRows[i].concepto] = true; }
      }
      semanas.sort(function(a,b){ return a-b; });
      anos.sort();
      conceptos.sort();
      renderPills('filter-semana', semanas, 'semana', true);
      renderPills('filter-ano', anos, 'ano', true);
      renderPills('filter-concepto', ['Todos'].concat(conceptos), 'concepto', false);
    }

    function renderPills(id, items, key, selectLast) {
      var container = document.getElementById(id);
      if (!container) return;
      container.innerHTML = '';
      for (var i = 0; i < items.length; i++) {
        var isActive = selectLast ? (i === items.length - 1) : (i === 0);
        var pill = document.createElement('span');
        pill.className = 'pill' + (isActive ? ' active' : '');
        pill.textContent = items[i];
        pill.setAttribute('data-key', key);
        pill.setAttribute('data-value', items[i]);
        pill.onclick = function() {
          var siblings = this.parentNode.querySelectorAll('.pill');
          for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove('active');
          this.classList.add('active');
          var k = this.getAttribute('data-key');
          var v = this.getAttribute('data-value');
          activeFilters[k] = v === 'Todos' ? null : v;
          applyFilters();
        };
        container.appendChild(pill);
        if (isActive) activeFilters[key] = items[i] === 'Todos' ? null : items[i];
      }
    }

    function applyFilters() {
      var filtered = [];
      for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        if (activeFilters.semana && r.semana != activeFilters.semana) continue;
        if (activeFilters.ano && r.ano != activeFilters.ano) continue;
        if (activeFilters.concepto && r.concepto != activeFilters.concepto) continue;
        filtered.push(r);
      }
      renderKPIs(filtered);
      renderDonut(filtered);
      renderTrend();
    }

    function renderKPIs(filtered) {
      var container = document.getElementById('kpi-container');
      if (!container) return;
      container.innerHTML = '';
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i].concepto;
        if (!c) continue;
        if (!groups[c]) groups[c] = [];
        groups[c].push(filtered[i].monto);
      }
      var idx = 0;
      var keys = Object.keys(groups);
      for (var i = 0; i < keys.length; i++) {
        var vals = groups[keys[i]];
        var sum = 0;
        for (var j = 0; j < vals.length; j++) sum += vals[j];
        var avg = sum / vals.length;
        var color = BANNER_COLORS[idx % BANNER_COLORS.length];
        var card = document.createElement('div');
        card.className = 'kpi-banner';
        card.style.background = 'linear-gradient(135deg, ' + color + ', ' + color + 'dd)';
        card.innerHTML = '<div class="kpi-title">' + keys[i] + '</div><div class="kpi-val">' + avg.toFixed(2) + '%</div><div class="kpi-sub">Promedio - ' + vals.length + ' registros</div>';
        container.appendChild(card);
        idx++;
      }
    }

    function renderDonut(filtered) {
      var groups = {};
      for (var i = 0; i < filtered.length; i++) {
        var c = filtered[i].concepto;
        if (!c) continue;
        if (!groups[c]) groups[c] = 0;
        groups[c]++;
      }
      var data = [];
      var keys = Object.keys(groups);
      for (var i = 0; i < keys.length; i++) {
        data.push({ name: keys[i], y: groups[keys[i]], color: BANNER_COLORS[i % BANNER_COLORS.length] });
      }
      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-donut', {
          chart: { type: 'pie', backgroundColor: 'transparent' },
          title: { text: null },
          tooltip: { pointFormat: '<b>{point.y} registros ({point.percentage:.1f}%)</b>' },
          plotOptions: { pie: { innerSize: '55%', borderWidth: 2, borderColor: '#fff', dataLabels: { enabled: true, format: '{point.name}<br>{point.percentage:.0f}%', style: { fontSize: '0.72rem', textOutline: 'none' } } } },
          series: [{ name: 'Registros', data: data }],
          credits: { enabled: false }
        });
      }
    }

    function renderTrend() {
      var semanasSet = {};
      var semanas = [];
      for (var i = 0; i < allRows.length; i++) {
        var s = allRows[i].semana;
        if (s && !semanasSet[s]) { semanas.push(s); semanasSet[s] = true; }
      }
      semanas.sort(function(a,b){ return a-b; });

      var map = {};
      for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        if (!r.concepto || !r.semana) continue;
        if (!map[r.concepto]) map[r.concepto] = {};
        if (!map[r.concepto][r.semana]) map[r.concepto][r.semana] = [];
        map[r.concepto][r.semana].push(r.monto);
      }

      var series = [];
      var cKeys = Object.keys(map);
      for (var i = 0; i < cKeys.length; i++) {
        var sData = [];
        for (var j = 0; j < semanas.length; j++) {
          var arr = map[cKeys[i]][semanas[j]];
          if (arr) {
            var sum = 0;
            for (var k = 0; k < arr.length; k++) sum += arr[k];
            sData.push(parseFloat((sum / arr.length).toFixed(2)));
          } else {
            sData.push(null);
          }
        }
        series.push({ name: cKeys[i], color: BANNER_COLORS[i % BANNER_COLORS.length], data: sData });
      }

      if (typeof Highcharts !== 'undefined') {
        Highcharts.chart('chart-line', {
          chart: { type: 'spline', backgroundColor: 'transparent' },
          title: { text: null },
          xAxis: { categories: semanas.map(function(s){ return 'Sem ' + s; }), labels: { style: { color: '#636e72', fontSize: '0.75rem' } } },
          yAxis: { title: { text: null }, labels: { style: { color: '#636e72' }, format: '{value}%' }, gridLineColor: '#f0f0f0' },
          tooltip: { shared: true, valueSuffix: '%' },
          legend: { itemStyle: { color: '#636e72', fontSize: '0.75rem' } },
          plotOptions: { spline: { marker: { radius: 4 }, lineWidth: 2.5 } },
          series: series,
          credits: { enabled: false }
        });
      }
    }

    function useFallback(msg) {
      allRows = FALLBACK_DATA;
      var dot = document.getElementById('status-dot');
      var status = document.getElementById('status-text');
      if (dot) dot.className = 'dot ok';
      if (status) status.textContent = 'Modo demo (datos de ejemplo) — En GitHub Pages se conectara a tu Sheet';
      buildFilters();
      applyFilters();
    }

    function loadFromSheet() {
      var dot = document.getElementById('status-dot');
      var status = document.getElementById('status-text');
      if (dot) dot.className = 'dot loading';
      if (status) status.textContent = 'Conectando con Google Sheets...';

      fetch(SHEET_URL)
        .then(function(response) {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.text();
        })
        .then(function(text) {
          if (text.indexOf('<!DOCTYPE') !== -1 || text.indexOf('<html') !== -1) {
            throw new Error('Sheet no publicado como CSV');
          }
          var rows = parseCSV(text);
          if (rows.length === 0) throw new Error('Sin datos');

          allRows = [];
          for (var i = 0; i < rows.length; i++) {
            var concepto = getVal(rows[i], COL_CONCEPTO);
            if (!concepto) continue;
            allRows.push({
              concepto: concepto,
              monto: getNumeric(rows[i]),
              semana: getVal(rows[i], COL_SEMANA),
              ano: getVal(rows[i], COL_ANO),
              lugar: getVal(rows[i], COL_LUGAR)
            });
          }

          if (dot) dot.className = 'dot ok';
          if (status) status.textContent = 'Conectado - ' + allRows.length + ' registros - ' + new Date().toLocaleString('es-MX');
          buildFilters();
          applyFilters();
        })
        .catch(function(err) {
          console.log('Fetch failed, using fallback:', err.message);
          useFallback(err.message);
        });
    }

    // Iniciar
    loadFromSheet();
  </script>

</body></html>
